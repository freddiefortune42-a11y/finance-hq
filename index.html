/* ------------------------- PORTFOLIO (Phase 3) ------------------------- */
function relTime(ms){
  if (!ms) return 'never';
  var s = Math.max(0, Math.round((Date.now() - ms) / 1000));
  if (s < 60) return 'just now';
  var m = Math.round(s / 60); if (m < 60) return m + 'm ago';
  var h = Math.round(m / 60); if (h < 24) return h + 'h ago';
  return Math.round(h / 24) + 'd ago';
}
function renderPortfolio(){
  var pv = portfolioValueB(), pcost = portfolioCostB(), pl = pv - pcost;
  var plCls = pl > 0 ? 'up' : (pl < 0 ? 'down' : 'flat');
  var hasCoins = uniqueCoinIds().length > 0;
  var asOf = pricesAsOf();

  var statusHtml = '';
  if (hasCoins){
    var offline = (typeof navigator !== 'undefined' && navigator.onLine === false);
    var ageMin = asOf ? (Date.now() - asOf) / 60000 : Infinity;
    var cls = 'live', txt;
    if (asOf === 0){ cls = 'off'; txt = 'Prices not fetched yet'; }
    else if (offline){ cls = 'off'; txt = 'Offline · prices ' + relTime(asOf); }
    else if (ageMin > 30){ cls = 'stale'; txt = 'Prices ' + relTime(asOf); }
    else { cls = 'live'; txt = 'Live · ' + relTime(asOf); }
    statusHtml = '<span class="pricestat ' + cls + '"><span class="live"></span>' + txt + '</span>';
  }

  var rows = state.holdings.map(function(h){
    var info = h.source === 'crypto' ? coinInfo(h.coinId) : { sym:(h.name || '?').replace(/[^A-Za-z]/g,'').slice(0,4).toUpperCase() || 'AST' };
    var priceOmr = holdingPriceOmr(h), valB = holdingValueB(h), costB = toB(h.costOmr || 0);
    var plB = valB === null ? null : valB - costB;
    var sub = h.source === 'crypto'
      ? fmtQty(h.quantity) + ' ' + info.sym + (priceOmr !== null ? ' · ' + fmtB(toB(priceOmr)) + '/ea' : ' · price pending')
      : 'Manual' + (h.quantity !== 1 ? ' · ' + fmtQty(h.quantity) + ' × ' + fmtB(toB(h.manualPriceOmr)) : '');
    return '<button class="hrow" data-action="holding-edit" data-id="' + h.id + '">' +
      '<span class="hsym" style="background:' + h.color + '">' + esc((info.sym || 'AST').slice(0,4)) + '</span>' +
      '<div class="grow"><div class="title">' + esc(h.name) + '</div><div class="hq num">' + sub + '</div></div>' +
      '<div class="right"><div class="hv num">' + (valB === null ? '—' : fmtB(valB)) + '</div>' +
        (plB !== null && costB > 0 ? '<div class="hpl ' + (plB > 0 ? 'up' : (plB < 0 ? 'down' : 'flat')) + ' num">' + (plB >= 0 ? '+' : '−') + fmtB(Math.abs(plB)) + '</div>' : '') +
      '</div></button>';
  }).join('');

  qs('#view').innerHTML =
    '<div class="pfgrid">' +
    '<section class="card sp5">' +
      '<p class="label">Portfolio value</p>' +
      '<p class="nw num" style="font-size:30px">' + fmtB(pv) + '<span class="cur">OMR</span></p>' +
      (pcost > 0 ? '<div class="pstat" style="margin-top:8px"><span class="pl ' + plCls + ' num">' +
        (pl >= 0 ? '+' : '−') + fmtB(Math.abs(pl)) + ' all-time</span>' +
        '<span class="muted num" style="font-size:12px">cost ' + fmtB(pcost) + '</span></div>' : '') +
      (hasCoins ? '<div style="margin-top:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">' +
        statusHtml + '<button class="btn btn-sm" data-action="refresh-prices" id="refresh-btn">' + ICO.refresh + ' Refresh</button></div>' +
        '<p class="muted" style="font-size:11px;margin-top:10px">Crypto valued from CoinGecko in USD, converted at ' + state.settings.usdToOmr + ' OMR/USD.</p>' : '') +
    '</section>' +
    '<section class="card sp7"><div class="cardhead"><h2 class="sec">Holdings</h2>' +
      '<button class="btn btn-sm btn-ghost" data-action="holding-add">' + ICO.plus + ' Add</button></div>' +
      (state.holdings.length ? rows : '<div class="empty">No holdings yet. Add crypto with live prices, or a manual asset (a trading balance, stocks, gold…).</div>') +
    '</section>' +
    '</div>';
}

/* ------------------------- REPORTS & PROJECTIONS (Phase 4) ------------------------- */
function buildProjChart(pts){
  var W = 640, H = 150, padT = 8, padB = 8;
  var vals = pts.map(function(p){ return p.b; });
  var maxB = Math.max.apply(null, vals), minB = Math.min(0, Math.min.apply(null, vals));
  var span = (maxB - minB) || 1, n = pts.length - 1 || 1;
  function x(i){ return (i / n) * W; }
  function y(b){ return padT + (1 - (b - minB) / span) * (H - padT - padB); }
  var line = pts.map(function(p, i){ return (i ? 'L' : 'M') + x(i).toFixed(1) + ' ' + y(p.b).toFixed(1); }).join(' ');
  var area = 'M' + x(0).toFixed(1) + ' ' + y(minB).toFixed(1) + ' ' +
    pts.map(function(p, i){ return 'L' + x(i).toFixed(1) + ' ' + y(p.b).toFixed(1); }).join(' ') +
    ' L' + x(n).toFixed(1) + ' ' + y(minB).toFixed(1) + ' Z';
  return '<svg class="projchart" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" aria-hidden="true">' +
    '<defs><linearGradient id="pgrad" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0" stop-color="var(--accent)" stop-opacity="0.28"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>' +
    '<path d="' + area + '" fill="url(#pgrad)"/>' +
    '<path d="' + line + '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>' +
    '</svg>';
}
function projInner(){
  var p = ui.proj;
  var pts = projectSeries(p.startB, p.monthlyB, p.annualPct, p.months);
  var endB = pts[pts.length - 1].b;
  var addedB = p.monthlyB * p.months;
  var growthB = endB - p.startB - addedB;
  return buildProjChart(pts) +
    '<div class="milestones">' +
      '<div class="ms"><div class="k">In ' + p.months + ' months</div><div class="v num">' + fmtB(endB) + '</div></div>' +
      '<div class="ms"><div class="k">You add</div><div class="v num">' + fmtB(addedB) + '</div></div>' +
      '<div class="ms"><div class="k">Growth</div><div class="v num">' + (growthB >= 0 ? '+' : '−') + fmtB(Math.abs(growthB)) + '</div></div>' +
    '</div>' +
    '<p class="scenario-note">A scenario, not a prediction. Assumes a steady ' + fmtB(p.monthlyB) + ' OMR/month added and ' +
      p.annualPct + '% annual growth applied to the whole balance. Real markets and spending vary.</p>';
}
function renderReports(){
  var ym = ui.month, rep = monthReport(ym);
  var incomeSet = rep.incomeB > 0;

  // KPIs
  var netCls = rep.netB > 0 ? 'pos' : (rep.netB < 0 ? 'neg' : '');
  var kpis = '<div class="kpis">' +
    '<div class="kpi"><div class="k">Income</div><div class="v num">' + fmtB(rep.incomeB) + '</div></div>' +
    '<div class="kpi"><div class="k">Spent</div><div class="v num">' + fmtB(rep.totalOutB) + '</div></div>' +
    '<div class="kpi"><div class="k">Net saved</div><div class="v num ' + netCls + '">' + (rep.netB >= 0 ? '+' : '−') + fmtB(Math.abs(rep.netB)) + '</div></div>' +
    '<div class="kpi"><div class="k">Savings rate</div><div class="v num ' + (rep.savingsRate >= 0 ? 'pos' : 'neg') + '">' + (incomeSet ? rep.savingsRate + '<small>%</small>' : '—') + '</div></div>' +
  '</div>';

  // per-category breakdown (all kinds with activity)
  var breakdown = rep.perCat.length ? rep.perCat.map(function(r){
    return '<div class="brow">' +
      '<div class="line1"><div class="name"><span class="dot" style="background:' + r.cat.color + '"></span><span>' + esc(r.cat.name) + '</span></div>' +
      '<div class="amt num"><b>' + fmtB(r.spentB) + '</b>' + (r.budgetB > 0 ? ' / ' + fmtB(r.budgetB) : '') + '</div></div>' +
      (r.budgetB > 0 ? budgetBar(r.spentB, r.budgetB) : miniBar(0, r.cat.color)) + '</div>';
  }).join('') : '<div class="empty">No activity in ' + monthLabel(ym) + '.</div>';

  // insights (current pace + last month) — only meaningful on/near the current month
  var insights = trendInsights().map(function(x){
    return '<div class="insight ' + x.kind + '"><span class="ic">' +
      (x.kind === 'good' ? ICO.check : x.kind === 'bad' ? ICO.down : x.kind === 'warn' ? ICO.up : ICO.sparkle) +
      '</span><div>' + x.html + '</div></div>';
  }).join('');

  // projection assumptions (kept in ui, not persisted)
  if (!ui.proj){
    var defMonthly = Math.max(0, toB(state.settings.monthlyIncome) - avgMonthlySpendB(3));
    ui.proj = { startB: netWorthTotalB(), monthlyB: defMonthly, annualPct: 5, months: 24 };
  } else {
    ui.proj.startB = netWorthTotalB();   // always project from current net worth
  }
  var p = ui.proj;
  var horizons = [12, 24, 60];
  var projection = '<section class="card span-full"><h2 class="sec">Net-worth projection</h2>' +
    '<div class="assume"><label for="proj-monthly">Added per month <b id="proj-monthly-lbl">' + fmtB(p.monthlyB) + ' OMR</b></label>' +
      '<input id="proj-monthly" class="input num" type="number" min="0" step="1" inputmode="decimal" value="' + inputVal(p.monthlyB) + '"></div>' +
    '<div class="assume"><label for="proj-growth">Annual growth <b id="proj-growth-lbl">' + p.annualPct + '%</b></label>' +
      '<input id="proj-growth" type="range" min="0" max="15" step="0.5" value="' + p.annualPct + '"></div>' +
    '<div class="assume"><label>Horizon</label><div class="btnrow" style="margin-bottom:0">' +
      horizons.map(function(h){ return '<button class="btn btn-sm proj-h' + (p.months === h ? ' btn-primary' : '') + '" data-months="' + h + '">' + (h < 12 ? h + ' mo' : (h / 12) + ' yr') + '</button>'; }).join('') +
    '</div></div>' +
    '<div id="proj-out">' + projInner() + '</div>' +
  '</section>';

  qs('#view').innerHTML =
    monthSwitcher() +
    '<div class="repgrid">' +
      '<section class="card sp7"><h2 class="sec">' + monthLabel(ym) + ' summary</h2>' + kpis +
        '<h2 class="sec" style="margin-top:16px">Where it went</h2>' + breakdown + '</section>' +
      '<section class="card sp5"><h2 class="sec">Insights</h2>' + insights + '</section>' +
      projection +
    '</div>';

  // --- projection bindings ---
  function commit(){
    var out = qs('#proj-out'); if (out) out.innerHTML = projInner();
  }
  var mEl = qs('#proj-monthly');
  if (mEl) mEl.addEventListener('change', function(){
    var b = parseAmount(mEl.value); ui.proj.monthlyB = (b === null || b < 0) ? 0 : b;
    qs('#proj-monthly-lbl').textContent = fmtB(ui.proj.monthlyB) + ' OMR'; commit();
  });
  var gEl = qs('#proj-growth');
  if (gEl) gEl.addEventListener('input', function(){
    ui.proj.annualPct = parseFloat(gEl.value) || 0;
    qs('#proj-growth-lbl').textContent = ui.proj.annualPct + '%'; commit();
  });
  qsa('.proj-h').forEach(function(btn){
    btn.addEventListener('click', function(){
      ui.proj.months = parseInt(btn.getAttribute('data-months'), 10) || 24;
      qsa('.proj-h').forEach(function(b){ b.classList.remove('btn-primary'); });
      btn.classList.add('btn-primary'); commit();
    });
  });
}

        Store.save(); render(); toast('Recurring bill deleted');
      });
    });
  }
  qs('#m-save').addEventListener('click', function(){
    var name = qs('#m-name').value.trim();
    if (!name){ toast('Enter a name'); return; }
    var b = parseAmount(qs('#m-amount').value);
    if (b === null || b <= 0){ toast('Enter a valid amount'); return; }
    var day = parseInt(qs('#m-day').value, 10);
    if (!isFinite(day) || day < 1 || day > 31){ toast('Day must be 1–31'); return; }
    if (isNew){
      state.recurring.push({ id: uid(), name:name, amount:fromB(b), categoryId:qs('#m-cat').value, dayOfMonth:day, active:true });
    } else {
      r.name = name; r.amount = fromB(b); r.categoryId = qs('#m-cat').value; r.dayOfMonth = day;
    }
    Store.save();
    autoPostRecurring();   // if due day already passed this month, post now
    closeSheet(); render(); toast(isNew ? 'Recurring bill added' : 'Saved');
  });
}

/* ---- goal add/edit ---- */
function openGoalModal(goal){

    '<div class="field"><label for="m-name">Goal name</label>' +
      '<input id="m-name" class="input" type="text" maxlength="40" value="' + esc(g.name) + '" placeholder="e.g. Emergency fund"></div>' +
    '<div class="fieldrow">' +
      '<div class="field"><label for="m-target">Target (OMR)</label>' +
        '<input id="m-target" class="input num" type="number" min="0" step="0.001" inputmode="decimal" value="' + (g.targetAmount ? inputVal(toB(g.targetAmount)) : '') + '"></div>' +
      '<div class="field"><label for="m-date">Target date</label>' +
        '<input id="m-date" class="input" type="date" value="' + g.targetDateISO + '"></div>' +

    '<div class="fieldrow">' +
      '<div class="field"><label for="m-current">Saved so far (OMR)</label>' +

      '<div class="field" style="flex:0 0 auto"><label for="m-color">Color</label>' +
        '<input id="m-color" type="color" value="' + g.color + '"></div>' +

    '<div class="field"><label for="m-note">Note (optional)</label>' +
      '<input id="m-note" class="input" type="text" maxlength="60" value="' + esc(g.note || '') + '" placeholder="What it\'s for"></div>' +
    '<div class="actions">' +
      (isNew ? '' : '<button class="btn btn-ghost" id="m-delete" style="flex:0 0 auto;color:var(--danger)">' + ICO.trash + '</button>') +
      '<button class="btn btn-primary" id="m-save">Save</button>' +
    '</div>'
  );
  qs('#m-close').addEventListener('click', closeSheet);
  if (!isNew){
    qs('#m-delete').addEventListener('click', function(){
      confirmDialog('Delete goal "' + esc(g.name) + '"? This only removes the goal, not any transactions.', 'Delete', function(){
        state.goals = state.goals.filter(function(x){ return x.id !== g.id; });
        Store.save(); render(); toast('Goal deleted');
      });
    });
  }
  qs('#m-save').addEventListener('click', function(){
    var name = qs('#m-name').value.trim();
    if (!name){ toast('Enter a name'); return; }
    var tb = parseAmount(qs('#m-target').value);
    if (tb === null || tb <= 0){ toast('Enter a target amount'); return; }
    var cb = parseAmount(qs('#m-current').value);
    var current = (cb === null || cb < 0) ? 0 : fromB(cb);
    var dateVal = qs('#m-date').value;
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dateVal)){ toast('Enter a target date'); return; }
    if (isNew){
      state.goals.push({ id: uid(), name:name, targetAmount:fromB(tb), currentAmount:current,
        targetDateISO:dateVal, color:qs('#m-color').value, note:qs('#m-note').value.trim() });
    } else {
      g.name = name; g.targetAmount = fromB(tb); g.currentAmount = current;
      g.targetDateISO = dateVal; g.color = qs('#m-color').value; g.note = qs('#m-note').value.trim();
    }

/* ---- add savings to a goal ---- */
function openContributeModal(goal){
  var saveCats = activeCats('saving').concat(activeCats('investing'));
  openSheet(
    '<h3>Add to ' + esc(goal.name) + ' <button class="iconbtn" id="m-close">' + ICO.close + '</button></h3>' +
    '<div class="field"><label for="m-amount">Amount to add (OMR)</label>' +
      '<input id="m-amount" class="input num" type="number" min="0" step="0.001" inputmode="decimal" placeholder="0.000"></div>' +
    (saveCats.length ?
      '<label class="switch" style="margin-bottom:12px"><input type="checkbox" id="m-log" checked><i></i><span>Also log it as a transaction</span></label>' +
      '<div class="fieldrow" id="m-logrow">' +
        '<div class="field"><label for="m-cat">Category</label><select id="m-cat" class="input">' +
          saveCats.map(function(c){ return '<option value="' + c.id + '">' + esc(c.name) + '</option>'; }).join('') + '</select></div>' +
        '<div class="field"><label for="m-date">Date</label><input id="m-date" class="input" type="date" value="' + todayISO() + '"></div>' +
      '</div>' : '') +
    '<div class="actions"><button class="btn btn-primary" id="m-save">Add savings</button></div>'
  );
  qs('#m-close').addEventListener('click', closeSheet);
  qs('#m-save').addEventListener('click', function(){
    var b = parseAmount(qs('#m-amount').value);

    var logEl = qs('#m-log');

      var dateVal = qs('#m-date').value;
      if (!/^\d{4}-\d{2}-\d{2}$/.test(dateVal)) dateVal = todayISO();
      state.transactions.push({ id: uid(), dateISO:dateVal, amount:fromB(b),
        categoryId: qs('#m-cat').value, note:'Goal: ' + goal.name, recurringId:null });
    }
    Store.save(); closeSheet(); render();
    toast(fmtB(b) + ' OMR → ' + goal.name + (goalRemainingB(goal) <= 0 ? ' · reached 🎉' : ''));
  });
}

/* ---- holding add/edit (Phase 3) ---- */
function openHoldingModal(hold){
  var isNew = !hold;
  var h = hold || { id:null, name:'', source:'crypto', coinId:'bitcoin', quantity:null, manualPriceOmr:0, costOmr:0, color:'#f5a623' };
  openSheet(
    '<h3>' + (isNew ? 'Add holding' : 'Edit holding') + ' <button class="iconbtn" id="m-close">' + ICO.close + '</button></h3>' +
    '<div class="field"><label for="m-source">Type</label><select id="m-source" class="input">' +
      '<option value="crypto"' + (h.source === 'crypto' ? ' selected' : '') + '>Crypto (live price)</option>' +
      '<option value="manual"' + (h.source === 'manual' ? ' selected' : '') + '>Manual asset (you set the value)</option>' +
    '</select></div>' +
    '<div class="field" id="blk-coin"><label for="m-coin">Coin</label><select id="m-coin" class="input">' +
      COINS.map(function(c){ return '<option value="' + c.id + '"' + (h.coinId === c.id ? ' selected' : '') + '>' + c.name + ' (' + c.sym + ')</option>'; }).join('') +
    '</select></div>' +
    '<div class="field" id="blk-name"><label for="m-name">Name</label>' +
      '<input id="m-name" class="input" type="text" maxlength="40" value="' + esc(h.name) + '" placeholder="e.g. Trading account"></div>' +
    '<div class="fieldrow">' +
      '<div class="field"><label for="m-qty" id="lbl-qty">Quantity</label>' +
        '<input id="m-qty" class="input num" type="number" min="0" step="any" inputmode="decimal" value="' + (h.quantity != null ? fmtQty(h.quantity).replace(/,/g,'') : '') + '" placeholder="0"></div>' +
      '<div class="field" id="blk-price"><label for="m-price">Price now (OMR)</label>' +
        '<input id="m-price" class="input num" type="number" min="0" step="0.001" inputmode="decimal" value="' + (h.source === 'manual' && h.manualPriceOmr ? inputVal(toB(h.manualPriceOmr)) : '') + '" placeholder="0.000"></div>' +
    '</div>' +
    '<div class="fieldrow">' +
      '<div class="field"><label for="m-cost">Total invested (OMR, optional)</label>' +
        '<input id="m-cost" class="input num" type="number" min="0" step="0.001" inputmode="decimal" value="' + (h.costOmr ? inputVal(toB(h.costOmr)) : '') + '" placeholder="for profit / loss"></div>' +
      '<div class="field" style="flex:0 0 auto"><label for="m-color">Color</label>' +
        '<input id="m-color" type="color" value="' + h.color + '"></div>' +
    '</div>' +
    '<div class="actions">' +
      (isNew ? '' : '<button class="btn btn-ghost" id="m-delete" style="flex:0 0 auto;color:var(--danger)">' + ICO.trash + '</button>') +
      '<button class="btn btn-primary" id="m-save">Save</button>' +
    '</div>'
  );
  function syncSource(){
    var src = qs('#m-source').value;
    qs('#blk-coin').style.display = src === 'crypto' ? '' : 'none';
    qs('#blk-name').style.display = src === 'manual' ? '' : 'none';
    qs('#blk-price').style.display = src === 'manual' ? '' : 'none';
    qs('#lbl-qty').textContent = src === 'crypto' ? 'Quantity (coins)' : 'Quantity';
  }
  syncSource();
  qs('#m-close').addEventListener('click', closeSheet);
  qs('#m-source').addEventListener('change', syncSource);
  if (!isNew){
    qs('#m-delete').addEventListener('click', function(){
      confirmDialog('Delete holding "' + esc(h.name) + '"? This cannot be undone.', 'Delete', function(){
        state.holdings = state.holdings.filter(function(x){ return x.id !== h.id; });
        Store.save(); render(); toast('Holding deleted');
      });
    });
  }
  qs('#m-save').addEventListener('click', function(){
    var src = qs('#m-source').value;
    var qty = parseQty(qs('#m-qty').value);
    if (qty === null || qty <= 0){ toast('Enter a quantity'); return; }
    var costB = parseAmount(qs('#m-cost').value);
    var cost = (costB === null || costB < 0) ? 0 : fromB(costB);
    var color = qs('#m-color').value;
    if (src === 'crypto'){
      var coinId = qs('#m-coin').value, info = coinInfo(coinId);
      var nm = qs('#m-name').value.trim() || info.name;
      if (isNew) state.holdings.push({ id: uid(), name:nm, source:'crypto', coinId:coinId, quantity:qty, costOmr:cost, color:color });
      else { h.name = nm; h.source = 'crypto'; h.coinId = coinId; h.quantity = qty; h.costOmr = cost; h.color = color; delete h.manualPriceOmr; }
    } else {
      var name = qs('#m-name').value.trim();
      if (!name){ toast('Enter a name'); return; }
      var pb = parseAmount(qs('#m-price').value);
      var price = (pb === null || pb < 0) ? 0 : fromB(pb);
      if (isNew) state.holdings.push({ id: uid(), name:name, source:'manual', quantity:qty, manualPriceOmr:price, costOmr:cost, color:color });
      else { h.name = name; h.source = 'manual'; h.manualPriceOmr = price; h.quantity = qty; h.costOmr = cost; h.color = color; delete h.coinId; }
    }
    Store.save();
    closeSheet(); render(); toast(isNew ? 'Holding added' : 'Saved');
    if (src === 'crypto') maybeRefreshPrices(true);
  });
}

/* ---- settings sheet ---- */
function openSettings(){
  openSheet(
    '<h3>Settings <button class="iconbtn" id="m-close">' + ICO.close + '</button></h3>' +
    '<div class="setrow">' + ICO.moon + '<span class="grow">Dark theme</span>' +
      '<label class="switch"><input type="checkbox" id="set-theme"' + (state.settings.theme !== 'light' ? ' checked' : '') + '><i></i></label></div>' +
    '<div class="setrow" style="align-items:center">' + ICO.wallet +
      '<div class="grow"><div>USD → OMR rate</div><div class="muted" style="font-size:12px">Values crypto holdings (rial is pegged)</div></div>' +
      '<input id="set-peg" class="input num" type="number" min="0" step="0.0001" inputmode="decimal" value="' + state.settings.usdToOmr + '" style="width:96px;padding:8px 10px"></div>' +
    '<button class="setrow" id="set-export">' + ICO.download + '<span class="grow">Export backup</span></button>' +
    '<button class="setrow" id="set-import">' + ICO.upload + '<span class="grow">Import backup</span></button>' +
    '<input type="file" id="set-file" accept=".json,application/json" style="display:none">' +
    '<button class="setrow" id="set-sample">' + ICO.sparkle + '<span class="grow">Load sample data</span></button>' +
    '<button class="setrow danger" id="set-fresh">' + ICO.trash + '<span class="grow">Start fresh</span></button>' +
    '<p class="muted" style="font-size:11px;margin-top:14px;text-align:center">Finance HQ · data stays on this device (localStorage — keep backups)</p>'
  );
  qs('#m-close').addEventListener('click', closeSheet);
  qs('#set-theme').addEventListener('change', function(e){
    state.settings.theme = e.target.checked ? 'dark' : 'light';
    Store.save(); applyTheme();
  });
  qs('#set-peg').addEventListener('change', function(e){
    var v = parseFloat(e.target.value);
    state.settings.usdToOmr = (isFinite(v) && v > 0) ? v : DEFAULT_PEG;
    e.target.value = state.settings.usdToOmr;
    Store.save();
  });
  qs('#set-export').addEventListener('click', function(){ Store.export(); });
  qs('#set-import').addEventListener('click', function(){ qs('#set-file').click(); });
  qs('#set-file').addEventListener('change', function(e){
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      var text = String(reader.result);
      // validate BEFORE asking, so a bad file never gets near existing data
      var probe;
      try { probe = JSON.parse(text); } catch(err){ toast('Import failed: not valid JSON'); return; }
      var v = validateState(probe);
      if (!v.ok){ toast('Import failed: ' + v.error); return; }
      confirmDialog('Replace all current data with this backup (' + probe.transactions.length + ' transactions)?', 'Replace', function(){
        var res = Store.import(text);
        if (res.ok){ applyTheme(); ui.month = ymNow(); ui.proj = null; autoPostRecurring(); recordSnapshot(); Store.save(); render(); maybeRefreshPrices(true); toast('Backup restored'); }
        else toast('Import failed: ' + res.error);
      });
    };
    reader.onerror = function(){ toast('Could not read file'); };
    reader.readAsText(file);
  });
  qs('#set-sample').addEventListener('click', function(){
    var msg = state.transactions.length ?
      'Replace your current data with sample data? Your ' + state.transactions.length + ' transactions will be lost.' :
      'Load sample data to explore the app?';
    confirmDialog(msg, 'Load sample', function(){
      state = buildSampleState();
      Store.save();
      ui.month = ymNow(); ui.notice = null; ui.proj = null;
      autoPostRecurring(); recordSnapshot(); Store.save();
      applyTheme(); render(); maybeRefreshPrices(true); toast('Sample data loaded');
    });
  });
  qs('#set-fresh').addEventListener('click', function(){
    confirmDialog('Erase everything and start fresh? Consider exporting a backup first.', 'Erase all', function(){
      var theme = state.settings.theme;
      state = defaultState();
      state.settings.theme = theme;
      Store.save();
      ui.month = ymNow(); ui.notice = null; ui.proj = null;
      render(); toast('Fresh start');
    });
  });
}

/* ============================================================
   9. GLOBAL EVENTS
   ============================================================ */
function quickAdd(catId){
  var amtEl = qs('#qa-amount');
  var b = parseAmount(amtEl.value);
  if (b === null || b <= 0){
    amtEl.classList.remove('shake'); void amtEl.offsetWidth; amtEl.classList.add('shake');
    amtEl.focus();
    toast('Enter an amount first');
    return;
  }
  var dateVal = qs('#qa-date').value;
  if (!/^\d{4}-\d{2}-\d{2}$/.test(dateVal)) dateVal = todayISO();
  var note = qs('#qa-note').value.trim();
  var cat = catById(catId);
  state.transactions.push({
    id: uid(), dateISO: dateVal, amount: fromB(b),
    categoryId: catId, note: note, recurringId: null
  });
  Store.save();
  ui.month = dateVal.slice(0, 7);   // jump to the month we just added to
  render();
  toast(fmtB(b) + ' OMR → ' + cat.name);
}

document.addEventListener('click', function(e){
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.getAttribute('data-action');
  var id = el.getAttribute('data-id');
  switch (action){
    case 'nav': {
      if (el.hasAttribute('data-disabled')){ toast('Coming in a later phase'); return; }
      ui.view = el.getAttribute('data-view');
      render();
      window.scrollTo(0, 0);
      break;
    }
    case 'open-settings': openSettings(); break;
    case 'dismiss-notice': ui.notice = null; render(); break;
    case 'month-prev': ui.month = addMonths(ui.month, -1); render(); break;
    case 'month-next': {
      if (monthsBetween(ymNow(), addMonths(ui.month, 1)) > 12){ toast('That’s far enough ahead'); return; }
      ui.month = addMonths(ui.month, 1); render(); break;
    }
    case 'month-now': ui.month = ymNow(); render(); break;
    case 'quick-add': quickAdd(id); break;
    case 'tx-edit': {
      var tx = state.transactions.find(function(t){ return t.id === id; });
      if (tx) openTxModal(tx);
      break;
    }
    case 'rec-add': openRecModal(null); break;
    case 'rec-edit': {
      var r = state.recurring.find(function(x){ return x.id === id; });
      if (r) openRecModal(r);
      break;
    }
    case 'cat-add': openCatModal(null); break;
    case 'cat-edit': {
      var c = state.categories.find(function(x){ return x.id === id; });
      if (c) openCatModal(c);
      break;
    }
    case 'cat-restore': {
      var cr = state.categories.find(function(x){ return x.id === id; });
      if (cr){ cr.archived = false; Store.save(); render(); toast('Restored ' + cr.name); }
      break;
    }
    case 'toggle-archived': ui.showArchived = !ui.showArchived; render(); break;
    case 'goal-add': openGoalModal(null); break;
    case 'goal-edit': {
      var goalE = state.goals.find(function(x){ return x.id === id; });
      if (goalE) openGoalModal(goalE);
      break;
    }
    case 'goal-contribute': {
      var goalC = state.goals.find(function(x){ return x.id === id; });
      if (goalC) openContributeModal(goalC);
      break;
    }
    case 'holding-add': openHoldingModal(null); break;
    case 'holding-edit': {
      var hE = state.holdings.find(function(x){ return x.id === id; });
      if (hE) openHoldingModal(hE);
      break;
    }
    case 'refresh-prices': {
      var rbtn = qs('#refresh-btn');
      if (rbtn){ rbtn.disabled = true; rbtn.style.opacity = '.6'; }
      toast('Refreshing prices…');
      refreshPrices(function(res){
        if (res && res.ok){ recordSnapshot(); Store.save(); render(); toast('Prices updated'); }
        else {
          render();
          toast(res && res.reason === 'offline' ? 'You’re offline — showing last known prices' :
                res && res.reason === 'timeout' ? 'Price service timed out — try again' :
                res && res.reason === 'no-coins' ? 'No crypto holdings to price' :
                'Could not refresh prices right now');
        }
      });
      break;
    }
    case 'preset': {
      var incomeB = toB(state.settings.monthlyIncome);
      if (incomeB <= 0){ toast('Set your monthly income first'); return; }
      var split = { essentials:50, wants:30, savings:10, crypto:5, trading:5 };
      var applied = false;
      state.categories.forEach(function(cat){
        if (cat.archived || !split[cat.seedKey]) return;
        setAlloc(ui.month, cat.id, fromB(Math.round(incomeB * split[cat.seedKey] / 100)));
        applied = true;
      });
      if (!applied){ toast('Preset needs the original five categories'); return; }
      Store.save(); render(); toast('50/30/20 preset applied — tweak freely');
      break;
    }
    case 'copy-last': {
      var prev = addMonths(ui.month, -1);
      activeCats().forEach(function(cat){
        setAlloc(ui.month, cat.id, fromB(baseBudgetB(prev, cat)));
      });
      Store.save(); render(); toast('Copied allocations from ' + monthLabel(prev));
      break;
    }
  }
});

document.addEventListener('keydown', function(e){
  if (e.key === 'Escape' && overlay.classList.contains('open')) closeSheet();
});

/* ============================================================
   10. INIT
   ============================================================ */
function init(){
  overlay = qs('#overlay');
  overlay.addEventListener('click', function(e){ if (e.target === overlay) closeSheet(); });
  state = Store.load();
  if (!state){ state = defaultState(); Store.save(); }
  applyTheme();
  autoPostRecurring();
  recordSnapshot(); Store.save();
  render();
  initPWA();
  maybeRefreshPrices(false);   // background price update if online & stale
}

// Hosted (https) copies get PWA extras: manifest, home-screen icon, offline
// service worker. Does nothing when opened via file:// (the Mac app).
function initPWA(){
  if (location.protocol !== 'https:') return;
  var m = document.createElement('link'); m.rel = 'manifest'; m.href = 'manifest.json';
  document.head.appendChild(m);
  var a = document.createElement('link'); a.rel = 'apple-touch-icon'; a.href = 'apple-touch-icon.png';
  document.head.appendChild(a);
  if ('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
}
init();

window.FHQ = {

  portfolioValueB: portfolioValueB, portfolioCostB: portfolioCostB, holdingValueB: holdingValueB,
  goalMonthly: goalMonthly, goalPct: goalPct, goalRemainingB: goalRemainingB,
  monthReport: monthReport, trendInsights: trendInsights, projectSeries: projectSeries,
  refreshPrices: refreshPrices, recordSnapshot: recordSnapshot, avgMonthlySpendB: avgMonthlySpendB
};
